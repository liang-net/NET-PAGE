<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title id="pageTitle">дё»йЎө</title>
<style>
:root{--bg:#0b1020;--bg2:#131c3a;--line:#2a3768;--text:#eaf0ff;--muted:#a9b4d0;--card:#141c38;--glow:#6fa3ff55}
body.day{--bg:#edf4ff;--bg2:#dbe9ff;--line:#b8ccef;--text:#14233f;--muted:#486088;--card:#f7fbff;--glow:#89b8ff66}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:linear-gradient(rgba(8,12,24,.45),rgba(8,12,24,.45)), var(--bg-image, none), radial-gradient(900px 500px at 20% -10%,var(--bg2),transparent 60%),radial-gradient(900px 500px at 110% 10%,var(--bg2),transparent 60%),var(--bg);background-size:cover,auto,auto,auto,auto;background-position:center,center,center,center,center;background-attachment:fixed,scroll,scroll,scroll,scroll}
.wrap{max-width:980px;margin:0 auto;padding:56px 20px}.hero,.card,.panel{background:linear-gradient(180deg,color-mix(in oklab,var(--card),#fff 3%),var(--card));border:1px solid var(--line);border-radius:18px;position:relative;overflow:hidden}.hero::after,.panel::after{content:"";position:absolute;inset:-120px -120px auto auto;width:260px;height:260px;background:radial-gradient(circle,var(--glow),transparent 65%)}
.hero{padding:34px}.hero h1{margin:0 0 10px;font-size:40px}.muted{color:var(--muted)}
.lang{display:flex;gap:8px;justify-content:flex-end;margin-bottom:8px}.lang button{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:10px;padding:6px 10px;cursor:pointer}
.status-grid,.grid,.projects{display:grid;gap:14px;margin-top:18px}.status-grid{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}.grid{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}.projects{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.panel,.card{padding:14px}.label{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}.icon{width:24px;height:24px;border-radius:8px;display:grid;place-items:center;background:color-mix(in oklab,var(--card),#000 6%);border:1px solid var(--line)}
.value{margin-top:8px;font-size:19px;font-weight:600}.clock-flip{display:flex;gap:6px;align-items:center}.digit{width:22px;height:30px;border-radius:6px;border:1px solid var(--line);display:grid;place-items:center;background:color-mix(in oklab,var(--card),#000 8%)}.digit span{font-size:18px;transition:.35s}.digit.flip span{transform:translateY(-120%);opacity:0}.colon{font-size:20px;opacity:.8}
.section-title{margin-top:24px;font-size:22px}.proj{border:1px solid var(--line);border-radius:14px;padding:14px;background:linear-gradient(180deg,color-mix(in oklab,var(--card),#fff 2%),var(--card))}.badge{display:inline-block;padding:2px 8px;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:12px}
.foot,.visitor-foot{color:var(--muted)}.visitor-foot{margin-top:14px;text-align:center;background:color-mix(in oklab,var(--card),#000 4%);border:1px solid var(--line);border-radius:12px;padding:10px 14px}
</style></head><body>
<main class="wrap">
<div class="lang"><button onclick="setLang('zh')">дёӯж–Ү</button><button onclick="setLang('en')">English</button></div>
<section class="hero"><h1 id="title"></h1><p id="subtitle" class="muted"></p>
<div class="status-grid">
<div class="panel"><div class="label"><span class="icon">рҹ“…</span><span data-i18n="date">еҪ“еүҚж—Ҙжңҹ</span></div><div id="dateNow" class="value">-</div></div>
<div class="panel"><div class="label"><span class="icon">вҸұпёҸ</span><span data-i18n="time">е®һж—¶ж—¶й—ҙ</span></div><div class="value"><div class="clock-flip" id="clockFlip"></div></div><div class="muted" data-i18n="timeSub">дёҠжө·ж—¶еҢә В· 24е°Ҹж—¶еҲ¶</div></div>
<div class="panel"><div class="label"><span class="icon" id="weatherIcon">рҹҢӨпёҸ</span><span data-i18n="weather">жң¬ең°еӨ©ж°”</span></div><div id="weather" class="value">еҠ иҪҪдёӯ...</div></div>
</div></section>
<section class="grid"><article class="card"><h3 id="sectionTitle1">жҲ‘жҳҜи°Ғ</h3><p id="about1" class="muted"></p></article><article class="card"><h3 id="sectionTitle2">жҲ‘еңЁеҒҡд»Җд№Ҳ</h3><p id="about2" class="muted"></p></article><article class="card"><h3 id="sectionTitle3">еҰӮдҪ•иҒ”зі»</h3><p id="about3" class="muted"></p></article></section>
<h3 class="section-title" id="projectsTitle">йЎ№зӣ®еұ•зӨә</h3><section class="projects" id="projectList"></section>
<div id="contact" class="foot"></div><div class="visitor-foot" id="visitorFoot">и®ҝе®ў IP дёҺең°еқҖпјҡеҠ иҪҪдёӯ...</div>
</main>
<script>
let lang=localStorage.getItem('lang')||'zh';
let currentTz='Asia/Shanghai';
let bgImageUrl='';
let __geo=null, __ip='жңӘзҹҘ', __weather=null, __placeZh='', __placeEn='';
const i18n={
 zh:{date:'еҪ“еүҚж—Ҙжңҹ',time:'е®һж—¶ж—¶й—ҙ',timeSub:'дёҠжө·ж—¶еҢә В· 24е°Ҹж—¶еҲ¶',weather:'жң¬ең°еӨ©ж°”',projects:'йЎ№зӣ®еұ•зӨә',ipaddr:'и®ҝе®ў IP дёҺең°еқҖпјҡ',fetchFail:'иҺ·еҸ–еӨұиҙҘ',locFail:'е®ҡдҪҚеӨұиҙҘ',view:'жҹҘзңӢйЎ№зӣ®'},
 en:{date:'Date',time:'Time',timeSub:'Asia/Shanghai В· 24h',weather:'Local Weather',projects:'Projects',ipaddr:'Visitor IP & Location: ',fetchFail:'Unavailable',locFail:'Location unavailable',view:'View'}
};
const weatherText={
 0:{zh:'жҷҙ',en:'Clear'},1:{zh:'еӨ§иҮҙжҷҙ',en:'Mainly clear'},2:{zh:'еұҖйғЁеӨҡдә‘',en:'Partly cloudy'},3:{zh:'йҳҙ',en:'Overcast'},45:{zh:'йӣҫ',en:'Fog'},48:{zh:'йӣҫеҮҮ',en:'Rime fog'},
 51:{zh:'е°ҸжҜӣйӣЁ',en:'Light drizzle'},53:{zh:'жҜӣйӣЁ',en:'Drizzle'},55:{zh:'жө“жҜӣйӣЁ',en:'Dense drizzle'},61:{zh:'е°ҸйӣЁ',en:'Light rain'},63:{zh:'дёӯйӣЁ',en:'Rain'},65:{zh:'еӨ§йӣЁ',en:'Heavy rain'},
 71:{zh:'е°ҸйӣӘ',en:'Light snow'},73:{zh:'дёӯйӣӘ',en:'Snow'},75:{zh:'еӨ§йӣӘ',en:'Heavy snow'},80:{zh:'йҳөйӣЁ',en:'Rain showers'},81:{zh:'ејәйҳөйӣЁ',en:'Heavy showers'},82:{zh:'жҡҙйӣЁ',en:'Violent rain'},95:{zh:'йӣ·жҡҙ',en:'Thunderstorm'}
};

const countryZhMap={JP:'ж—Ҙжң¬',US:'зҫҺеӣҪ',CN:'дёӯеӣҪ',HK:'дёӯеӣҪйҰҷжёҜ',TW:'дёӯеӣҪеҸ°ж№ҫ',SG:'ж–°еҠ еқЎ',KR:'йҹ©еӣҪ',GB:'иӢұеӣҪ',DE:'еҫ·еӣҪ',FR:'жі•еӣҪ',CA:'еҠ жӢҝеӨ§',AU:'жҫіеӨ§еҲ©дәҡ',RU:'дҝ„зҪ—ж–Ҝ',IN:'еҚ°еәҰ',TH:'жі°еӣҪ',MY:'й©¬жқҘиҘҝдәҡ',PH:'иҸІеҫӢе®ҫ',ID:'еҚ°еәҰе°јиҘҝдәҡ',VN:'и¶ҠеҚ—'};
function countryName(geo){
  const code=(geo?.country_code||geo?.country||'').toUpperCase();
  if(!code) return geo?.country_name||'';
  if(lang==='zh' && countryZhMap[code]) return countryZhMap[code];
  try{ const dn=new Intl.DisplayNames([lang==='zh'?'zh-Hans':'en'],{type:'region'}); return dn.of(code)||geo?.country_name||code; }
  catch(e){ return geo?.country_name||code; }
}
function placeName(){
  if(lang==='zh' && __placeZh) return __placeZh;
  if(lang==='en' && __placeEn) return __placeEn;
  return __geo?.city || __geo?.region || (lang==='zh'?'жң¬ең°':'Local');
}

const weatherIcon={0:'вҳҖпёҸ',1:'рҹҢӨпёҸ',2:'вӣ…',3:'вҳҒпёҸ',45:'рҹҢ«пёҸ',48:'рҹҢ«пёҸ',51:'рҹҢҰпёҸ',53:'рҹҢҰпёҸ',55:'рҹҢ§пёҸ',61:'рҹҢҰпёҸ',63:'рҹҢ§пёҸ',65:'рҹҢ§пёҸ',71:'рҹҢЁпёҸ',73:'вқ„пёҸ',75:'вқ„пёҸ',80:'рҹҢҰпёҸ',81:'вӣҲпёҸ',82:'вӣҲпёҸ',95:'вӣҲпёҸ'};
function applyI18n(){document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;el.textContent=i18n[lang][k]||k;});}
function setLang(l){lang=l;localStorage.setItem('lang',l);applyI18n();loadGeoAndWeather();}
window.setLang=setLang; applyI18n();

fetch('/data/site.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  for(const k of ['siteTitle','title','subtitle','sectionTitle1','sectionTitle2','sectionTitle3','about1','about2','about3','projectsTitle','contact']){const el=document.getElementById(k); if(el) el.textContent=d[k]||'';}
  bgImageUrl=(d.backgroundImageUrl||'').trim();
  if(bgImageUrl){ document.body.style.setProperty('--bg-image', `url(${bgImageUrl})`); } else { document.body.style.setProperty('--bg-image','none'); }
  if(d.siteTitle) document.title=d.siteTitle;
  if(d.timeZone){ currentTz=d.timeZone; const sub=document.querySelector('[data-i18n="timeSub"]'); if(sub){ sub.textContent=(lang==='zh'?`ж—¶еҢәпјҡ${currentTz} В· 24е°Ҹж—¶еҲ¶`:`TZ: ${currentTz} В· 24h`);} }
  const list=document.getElementById('projectList'); list.innerHTML=''; (d.projects||[]).forEach(p=>{const a=document.createElement('article');a.className='proj';a.innerHTML=`<div style="display:flex;justify-content:space-between;gap:10px"><strong>${p.name||''}</strong><span class="badge">${p.status||''}</span></div><p class="muted" style="margin:8px 0 10px">${p.desc||''}</p><a href="${p.link||'#'}" target="_blank" rel="noreferrer">${i18n[lang].view}</a>`; list.appendChild(a);});
});

function setThemeByTZ(){ document.body.classList.remove('day'); }
function renderFlipClock(t){const target=document.getElementById('clockFlip');if(!target.dataset.init){target.innerHTML='';for(const ch of t){if(ch===':'){const c=document.createElement('div');c.className='colon';c.textContent=':';target.appendChild(c);}else{const d=document.createElement('div');d.className='digit';d.innerHTML='<span>'+ch+'</span>';target.appendChild(d);}}target.dataset.init='1';return;}const digits=[...target.querySelectorAll('.digit')];let i2=0;for(const ch of t){if(ch===':')continue;const cell=digits[i2++],sp=cell.querySelector('span');if(sp.textContent!==ch){cell.classList.add('flip');setTimeout(()=>{sp.textContent=ch;cell.classList.remove('flip');},170);}}}
function tick(){const n=new Date();document.getElementById('dateNow').textContent=n.toLocaleDateString(lang==='zh'?'zh-CN':'en-US',{timeZone:currentTz,year:'numeric',month:'2-digit',day:'2-digit',weekday:'long'});renderFlipClock(n.toLocaleTimeString(lang==='zh'?'zh-CN':'en-US',{timeZone:currentTz,hour12:false}));setThemeByTZ();}
tick();setInterval(tick,1000);


function renderDynamic(){
  if(__geo){
    const city=placeName();
    const country=countryName(__geo); const region=(lang==='zh' && __placeZh)?'':(__geo.region||'');
    document.getElementById('visitorFoot').textContent=`${i18n[lang].ipaddr}${__ip} В· ${country}${region?(' / '+region):''}${city?(' / '+city):''}`;
  }
  if(__weather){
    const city=placeName();
    const txt=(weatherText[__weather.code]?.[lang]) || (lang==='zh'?'еӨ©ж°”':'Weather');
    document.getElementById('weather').textContent=`${city} В· ${__weather.temp ?? '--'}В°C В· ${txt}`;
    document.getElementById('weatherIcon').textContent=weatherIcon[__weather.code]||'рҹҢЎпёҸ';
  }
}


async function loadGeoAndWeather(){
  // only re-render localized labels using cached server data
  renderDynamic();
  if(!__weather || __weather.code===undefined) document.getElementById('weather').textContent=i18n[lang].locFail;
}



(async function(){
  try{
    const r=await fetch('/api/public-info');
    const j=await r.json();
    if(j && j.geo){
      __ip=j.geo.ip||'жңӘзҹҘ';
      __geo={
        latitude:j.geo.latitude, longitude:j.geo.longitude,
        city:j.geo.city, region:j.geo.region,
        country_name:j.geo.country_name, country_code:j.geo.country_code
      };
      __placeZh=j.placeZh||''; __placeEn=j.placeEn||'';
      __weather=j.weather||null;
      renderDynamic();
      if(!__weather || __weather.code===undefined) document.getElementById('weather').textContent=i18n[lang].locFail;
    }else{
      document.getElementById('weather').textContent=i18n[lang].fetchFail;
      document.getElementById('visitorFoot').textContent=`${i18n[lang].ipaddr}${i18n[lang].fetchFail}`;
    }
  }catch(e){
    document.getElementById('weather').textContent=i18n[lang].fetchFail;
    document.getElementById('visitorFoot').textContent=`${i18n[lang].ipaddr}${i18n[lang].fetchFail}`;
  }
})();
</script></body></html>
